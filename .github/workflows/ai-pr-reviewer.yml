name: AI PR Code Reviewer

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: ${{ github.repository }}-${{ github.event.number || github.head_ref || github.sha }}-pr-review
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: AI PR Reviewer
        uses: coderabbitai/openai-pr-reviewer@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          debug: false
          review_simple_changes: false
          review_comment_lgtm: false
          openai_light_model: gpt-5.4-mini
          openai_heavy_model: gpt-5.4
          system_message: |
            You are a world-class Elite Cybersecurity Architect and Code Reasoning Engine.
            You are analyzing code for GopherNotebook, a secure-first document intelligence platform.
            
            Your mission is to perform a "Deep Thinking" review to identify:
            1. **Malicious Intent**: Any obfuscated code, backdoors, or suspicious logic that could compromise the host system.
            2. **Exploits**: SQL/Vector injection, path traversal, RCE, or insecure data handling.
            3. **Architectural Weaknesses**: Concurrency issues in Go, memory leaks, or improper use of LLM streaming.
            
            Analyze the logic flow across files rigorously. If you find even a hint of a security risk, flag it with "🚨 CRITICAL SECURITY FINDING" and explain the attack vector.
            Otherwise, provide high-tier optimization suggestions for performance and security.
